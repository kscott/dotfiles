separator = " | "

lines = [
  "$model | $cost | $duration | $status",
  "$context_bar $context_tokens $context_pct",
]

[model]
symbol = "󰚩 "
style = "bold fg:#fabd2f"
format = "{symbol}{value}"
min_term_width = 0

[cost]
symbol = " "
style = "fg:#b8bb26"
warn_threshold = 2.0
warn_style = "fg:#fabd2f"
critical_threshold = 5.0
critical_style = "bold fg:#fb4934"

[duration]
symbol = " "
style = "fg:#928374"

[status]

[context_bar]
symbol = " "
width = 20
fill_char = "█"
empty_char = "░"
style = "fg:#8ec07c"
warn_threshold = 40.0
warn_style = "fg:#fabd2f"
critical_threshold = 70.0
critical_style = "bold fg:#fb4934"

[context_tokens]
style = "fg:#a89984"

[context_pct]
style = "fg:#a89984"
